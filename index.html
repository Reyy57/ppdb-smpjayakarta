<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPDB SMP Jayakarta</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(270deg, #667eea, #764ba2, #3a1c71);
            background-size: 600% 600%;
            animation: gradientAnimation 10s ease infinite;
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            min-height: 100vh;
            margin: 0;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 450px; 
        }

        /* Perbaikan Logo agar tidak terpotong dan proporsional */
        .logo { 
            width: 100%;       
            max-width: 150px;  
            height: auto;      
            display: block; 
            margin: 0 auto 20px auto; 
            object-fit: contain; 
        }

        h1 { font-size: 1.5rem; text-align: center; color: #333; margin-bottom: 25px; }
        
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }

        label { font-size: 0.9rem; font-weight: 600; margin-top: 10px; display: block; color: #444; }
        input, select, textarea { display: block; width: 100%; margin: 8px 0 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        button { 
            width: 100%; padding: 14px; background-color: #764ba2; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        button:hover { background-color: #5a377d; transform: scale(1.02); }
        
        .wa-btn { 
            background-color: #25d366; margin-top: 20px; text-align: center; text-decoration: none; display: block; padding: 14px; color: white; border-radius: 8px; font-weight: bold; transition: 0.3s;
        }
        .wa-btn:hover { background-color: #1da851; transform: scale(1.02); }
        
        .footer-text { text-align: center; font-size: 0.8rem; color: #888; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Nama file sudah disesuaikan dengan file yang baru di-upload -->
        <img src="IMG-20260606-WA0002.jpg" alt="Logo SMP Jayakarta" class="logo">
        
        <h1>Formulir PPDB SMP Jayakarta</h1>
        
        <form action="https://formspree.io/f/xpqeqrpy" method="POST">
            <div class="row">
                <div class="col">
                    <label>First Name</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="col">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required>
                </div>
            </div>
            
            <label>Alamat Lengkap</label>
            <textarea name="alamat" rows="2" required></textarea>
            
            <label>Asal Sekolah SD</label>
            <input type="text" name="asal_sekolah" required>
            
            <label>Nama Orang Tua/Wali</label>
            <input type="text" name="nama_ortu" required>
            
            <label>Nomor WhatsApp</label>
            <input type="tel" name="whatsapp" required>
            
            <label>Pilihan Gelombang</label>
            <select name="gelombang">
                <option value="Gelombang 1">Gelombang 1</option>
                <option value="Gelombang 2">Gelombang 2</option>
            </select>
            
            <label>Minat Ekstrakurikuler</label>
            <input type="text" name="ekstrakurikuler" placeholder="Contoh: Futsal, Pramuka, Musik">
            
            <button type="submit">Kirim Pendaftaran</button>
        </form>
        
        <a href="https://wa.me/6283136106128" class="wa-btn">Tanya Admin via WhatsApp</a>
        
        <div class="footer-text">
            Kado perpisahan dari Reyfalka untuk SMP Jayakarta 😊
        </div>
    </div>
</body>
</html>
