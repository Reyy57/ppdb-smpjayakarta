<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPDB SMP Jayakarta</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 500px; }
        h1 { font-size: 1.4rem; text-align: center; color: #333; }
        label { font-size: 0.9rem; font-weight: bold; margin-top: 10px; display: block; color: #555; }
        input, select, textarea { display: block; width: 100%; margin: 5px 0 15px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #764ba2; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .wa-btn { background-color: #25d366; margin-top: 20px; text-align: center; text-decoration: none; display: block; padding: 12px; color: white; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Formulir PPDB SMP Jayakarta</h1>
        <form action="https://formspree.io/f/xpqeqrpy" method="POST">
            <label>Nama Lengkap</label>
            <input type="text" name="nama" required>
            
            <label>Alamat Lengkap</label>
            <textarea name="alamat" rows="2" required></textarea>
            
            <label>Asal Sekolah SD</label>
            <input type="text" name="asal_sekolah" required>
            
            <label>Nama Orang Tua/Wali</label>
            <input type="text" name="nama_ortu" required>
            
            <label>Nomor WhatsApp</label>
            <input type="tel" name="whatsapp" required>
            
            <label>Pilihan Gelombang</label>
            <select name="gelombang">
                <option value="Gelombang 1">Gelombang 1</option>
                <option value="Gelombang 2">Gelombang 2</option>
            </select>
            
            <label>Minat Ekstrakurikuler</label>
            <input type="text" name="ekstrakurikuler" placeholder="Contoh: Futsal, Pramuka, Musik">
            
            <button type="submit">Kirim Pendaftaran</button>
        </form>
        
        <a href="https://wa.me/6283136106128" class="wa-btn">Tanya Admin via WhatsApp</a>
    </div>
</body>
</html>
