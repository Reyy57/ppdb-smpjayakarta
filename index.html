<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPDB SMP Jayakarta</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body { 
            font-family: 'Inter', sans-serif; 
            background: #f0f2f5; 
            display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0;
            color: #333;
        }
        .container { 
            background: white; padding: 40px; border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06); width: 100%; max-width: 450px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .logo { 
            width: 120px; height: 120px; display: block; 
            margin: 0 auto 25px auto; object-fit: contain; 
            border-radius: 20px; padding: 5px;
        }
        h1 { font-size: 1.6rem; text-align: center; color: #1a1a1a; margin-bottom: 30px; letter-spacing: -0.5px; }
        
        label { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; display: block; color: #666; }
        input, select, textarea { 
            display: block; width: 100%; margin-bottom: 20px; padding: 14px; 
            border: 2px solid #eef0f2; border-radius: 12px; font-size: 1rem;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus { border-color: #56ab2f; outline: none; box-shadow: 0 0 0 4px rgba(86,171,47,0.1); }
        
        button { 
            width: 100%; padding: 16px; background: #2d5a27; color: white; border: none; 
            border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #3e7a37; transform: translateY(-2px); }
        
        .wa-btn { 
            background: #e8f5e9; color: #2e7d32; margin-top: 15px; text-align: center; 
            text-decoration: none; display: block; padding: 16px; border-radius: 12px; 
            font-weight: 600; transition: 0.3s;
        }
        .wa-btn:hover { background: #d0eadd; }
        
        .footer-text { text-align: center; font-size: 0.75rem; color: #999; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="IMG-20260606-WA0002.jpg" alt="Logo" class="logo">
        <h1>Pendaftaran PPDB</h1>
        
        <form action="https://formspree.io/f/xpqeqrpy" method="POST">
            <label>Nama Depan</label>
            <input type="text" name="first_name" required>
            <label>Nama Belakang</label>
            <input type="text" name="last_name" required>
            <label>Alamat Lengkap</label>
            <textarea name="alamat" rows="2" required></textarea>
            <label>Asal Sekolah SD</label>
            <input type="text" name="asal_sekolah" required>
            <label>Nama Orang Tua/Wali</label>
            <input type="text" name="nama_ortu" required>
            <label>Nomor WhatsApp</label>
            <input type="tel" name="whatsapp" required>
            <label>Gelombang</label>
            <select name="gelombang">
                <option value="Gelombang 1">Gelombang 1</option>
                <option value="Gelombang 2">Gelombang 2</option>
            </select>
            <label>Minat Ekstrakurikuler</label>
            <input type="text" name="ekstrakurikuler">
            
            <button type="submit">Kirim Pendaftaran</button>
        </form>
        
        <a href="https://wa.me/6283136106128" class="wa-btn">Konsultasi via WhatsApp</a>
        
        <div class="footer-text">
            © 2026 SMP Jayakarta | Dibuat dengan sepenuh hati
        </div>
    </div>
</body>
</html>
